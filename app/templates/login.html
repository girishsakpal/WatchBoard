{% extends "base.html" %}
{% block title %}Log in - WatchBoard{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}" />{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <p class="auth-eyebrow">Welcome back</p>
    <h1>Log in to your board</h1>

    <form method="post" action="{{ url_for('auth.login_page') }}" class="auth-form">
      <input type="hidden" name="next" value="{{ next_path or '' }}" />
      <label>
        Username
        <input type="text" name="username" value="{{ username or '' }}" required autocomplete="username" autofocus />
      </label>
      <label>
        Password
        <input type="password" name="password" required autocomplete="current-password" />
      </label>
      <button type="submit" class="btn btn--primary">Log in</button>
    </form>

    <p class="auth-switch">Don't have an account? <a href="{{ url_for('auth.signup_page') }}">Sign up</a></p>
  </div>
</div>
{% endblock %}
