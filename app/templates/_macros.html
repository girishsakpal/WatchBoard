{% macro star_rating(rating, out_of=10) %}
{% if rating %}
{% set stars = rating / (out_of / 5) %}
<span class="star-rating" aria-label="Rated {{ rating }} out of {{ out_of }}">
  {% for i in range(1, 6) %}
    <span class="star-slot">
      <span class="star-slot__empty">★</span><span class="star-slot__fill" style="width: {{ '100%' if stars >= i else ('50%' if stars >= i - 0.5 else '0%') }};">★</span>
    </span>
  {% endfor %}
</span>
{% endif %}
{% endmacro %}
